name: marcia_mobile
description: "Tool Android per acquisizione dati barcode e OCR."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  mobile_scanner: ^6.0.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - .env
